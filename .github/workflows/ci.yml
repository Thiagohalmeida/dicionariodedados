name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm run typecheck
      - run: corepack pnpm run build
