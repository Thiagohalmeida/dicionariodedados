kind = "web"
previewPath = "/"
title = "Validador de Dicionário de Dados"
version = "1.0.0"
id = "artifacts/data-dict"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24992

[services.development]
run = "pnpm --filter @workspace/data-dict run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/data-dict", "run", "build" ]
publicDir = "artifacts/data-dict/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24992"
BASE_PATH = "/"
