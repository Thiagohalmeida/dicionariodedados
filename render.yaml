services:
  - type: web
    name: validador-api
    runtime: node
    plan: free
    buildCommand: |
      npm install -g pnpm@10
      pnpm install --no-frozen-lockfile
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: LOG_LEVEL
        value: info
      - key: ALLOWED_ORIGINS
        value: https://seu-app.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET_EXCEL_UPLOADS
        value: excel-uploads
      - key: SUPABASE_BUCKET_EXPORTS
        value: exports
    autoDeploy: true